databaseChangeLog:
  - changeSet:
      id: 003-add-missing-tables
      author: cascade
      changes:
        # Add global_id to users table
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: global_id
                  type: varchar(64)
        - addUniqueConstraint:
            tableName: users
            columnNames: global_id
            constraintName: uq_users_global_id

        # Create accounts table
        - createTable:
            tableName: accounts
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: varchar(250), constraints: { nullable: false } }
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: accounts
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_accounts_user
            onDelete: CASCADE
        - createIndex:
            tableName: accounts
            indexName: idx_accounts_user
            columns: [ { column: { name: user_id } } ]

        # Create categories table
        - createTable:
            tableName: categories
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: varchar(250), constraints: { nullable: false } }
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: categories
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_categories_user
            onDelete: CASCADE
        - createIndex:
            tableName: categories
            indexName: idx_categories_user
            columns: [ { column: { name: user_id } } ]

        # Create transactions table
        - createTable:
            tableName: transactions
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: transaction_type, type: int, constraints: { nullable: false } }
              - column: { name: name, type: varchar(128), constraints: { nullable: false } }
              - column: { name: comments, type: varchar(512) }
              - column: { name: date, type: timestamp, constraints: { nullable: false } }
              - column: { name: amount, type: numeric(12,2), constraints: { nullable: false } }
              - column: { name: account_id, type: bigint, constraints: { nullable: false } }
              - column: { name: category_id, type: bigint, constraints: { nullable: false } }
              - column: { name: is_countable, type: int, defaultValue: "1" }
        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: account_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_transactions_account
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_transactions_category
            onDelete: CASCADE
        - createIndex:
            tableName: transactions
            indexName: idx_transactions_date
            columns: [ { column: { name: date } } ]
        - createIndex:
            tableName: transactions
            indexName: idx_transactions_account
            columns: [ { column: { name: account_id } } ]

        # Recreate splits table to match Flutter structure
        - dropTable:
            tableName: splits
        - createTable:
            tableName: splits
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: transaction_id, type: bigint, constraints: { nullable: false } }
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: amount, type: numeric(12,2), constraints: { nullable: false } }
              - column: { name: settled_at, type: timestamp }
              - column: { name: is_settled, type: int, defaultValue: "0" }
        - addForeignKeyConstraint:
            baseTableName: splits
            baseColumnNames: transaction_id
            referencedTableName: transactions
            referencedColumnNames: id
            constraintName: fk_splits_transaction
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: splits
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_splits_user
            onDelete: CASCADE
        - createIndex:
            tableName: splits
            indexName: idx_splits_transaction
            columns: [ { column: { name: transaction_id } } ]
        - createIndex:
            tableName: splits
            indexName: idx_splits_user
            columns: [ { column: { name: user_id } } ]

        # Create json_store table for app settings
        - createTable:
            tableName: json_store
            columns:
              - column: { name: name, type: varchar(64), constraints: { primaryKey: true, nullable: false } }
              - column: { name: value, type: text }
