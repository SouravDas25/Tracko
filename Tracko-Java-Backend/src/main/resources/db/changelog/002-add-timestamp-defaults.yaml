databaseChangeLog:
  - changeSet:
      id: 002-add-timestamp-defaults
      author: cascade
      changes:
        # Add default timestamps to existing created_at columns
        - addDefaultValue:
            tableName: chat_groups
            columnName: created_at
            defaultValueComputed: CURRENT_TIMESTAMP
        - addDefaultValue:
            tableName: chat_messages
            columnName: created_at
            defaultValueComputed: CURRENT_TIMESTAMP
        - addDefaultValue:
            tableName: splits
            columnName: created_at
            defaultValueComputed: CURRENT_TIMESTAMP
        - addDefaultValue:
            tableName: nlp_data
            columnName: created_at
            defaultValueComputed: CURRENT_TIMESTAMP
        
        # Add created_at and updated_at to users table
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
