spring:
  datasource:
    url: jdbc:h2:file:./tracko-dev-db;MODE=PostgreSQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

# Optional H2 console
server:
  port: 8080

h2:
  console:
    enabled: true
    path: /h2-console

logging:
  level:
    liquibase: info
    org.hibernate.SQL: warn
