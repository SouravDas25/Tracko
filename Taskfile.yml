version: '3'

vars:
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend
  DOCKER_IMAGE: tracko-app:latest
  DOCKER_PUBLISH_IMAGE: sd25/tracko-app:latest
  DOCKER_TAR: dist/tracko-app.tar

tasks:
  # Show common commands
  help:
    desc: Show available tasks
    cmds:
      - echo "Tracko - Expense Manager"
      - echo ""
      - echo "Available tasks:"
      - echo "  task start     # Start Flutter UI and Java Backend"
      - echo "  task flutter   # Start Flutter UI only"
      - echo "  task backend   # Start Java Backend only (detached)"
      - echo "  task stop      # Stop all services"
      - echo "  task clean     # Clean build artifacts"
      - echo "  task test      # Run tests"
      - echo "  task install   # Install dependencies"
      - echo "  task release:apk # Generate release APK for Android"

  # Start both services (backend detached, flutter in foreground)
  start:
    desc: Start Flutter UI and Java Backend
    deps: [backend, flutter]

  # Start Flutter UI only
  flutter:
    desc: Start Flutter UI (Chrome)
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - cmd: flutter run -d chrome

  # Start Java Backend only (detached to avoid interactive prompts on Windows)
  backend:
    desc: Start Java Backend (Spring Boot, dev profile)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - cmd: mvn -DskipTests spring-boot:run -P dev
    silent: true

  # Stop all services
  stop:
    desc: Stop all services
    cmds:
      - cmd: >-
          powershell -NoLogo -NoProfile -Command '& {
            $ErrorActionPreference = "SilentlyContinue"
            try {
              $processId = (Get-NetTCPConnection -LocalPort 8080 -ErrorAction SilentlyContinue |
                Select-Object -ExpandProperty OwningProcess -Unique)
              if ($processId) { Stop-Process -Id $processId -Force -ErrorAction SilentlyContinue }
              Get-Process -Name "flutter" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            } catch {
            }
            exit 0
          }'
        platforms: [windows]
      - cmd: bash -lc "pkill -f 'flutter run' || true; pkill -f 'mvn spring-boot:run' || true"
        platforms: [linux, darwin]

  # Clean build artifacts
  clean:
    desc: Clean build artifacts
    cmds:
      - cmd: flutter clean
        dir: "{{.FRONTEND_DIR}}"
      - cmd: mvn -B clean
        dir: "{{.BACKEND_DIR}}"
      

  # Run tests
  test:
    desc: Run tests (Flutter and Backend)
    deps: [test:backend, test:flutter]

  test:backend:
    desc: Run Backend tests (Maven verify)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - cmd: mvn verify

  test:flutter:
    desc: Run Flutter tests
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - cmd: flutter test
        
      

  # Install dependencies
  install:
    desc: Install dependencies (Flutter and Backend)
    cmds:
      - cmd: flutter pub get
        dir: "{{.FRONTEND_DIR}}"
      
      - cmd: mvn -B install -P dev
        dir: "{{.BACKEND_DIR}}"
      
  # Generate release APK
  release:apk:
    desc: Generate release APK for Android and copy to dist folder
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - cmd: flutter build apk --release
      - cmd: >-
          powershell -NoLogo -NoProfile -Command "New-Item -ItemType Directory -Force -Path ..\dist | Out-Null"
        platforms: [windows]
      - cmd: mkdir -p ../dist
        platforms: [linux, darwin]
      - cmd: >-
          powershell -NoLogo -NoProfile -Command "Copy-Item -Path 'build\app\outputs\flutter-apk\app-release.apk' -Destination '..\dist\app-release.apk' -Force"
        platforms: [windows]
      - cmd: cp build/app/outputs/flutter-apk/app-release.apk ../dist/app-release.apk
        platforms: [linux, darwin]
      

  docker:tar:
    desc: Build the Docker image (root Dockerfile) and export it as a .tar
    cmds:
      - cmd: >-
          powershell -NoLogo -NoProfile -Command "New-Item -ItemType Directory -Force -Path dist | Out-Null"
        platforms: [windows]
      - cmd: mkdir -p dist
        platforms: [linux, darwin]
      - cmd: docker build -t "{{.DOCKER_IMAGE}}" .
      - cmd: docker save -o "{{.DOCKER_TAR}}" "{{.DOCKER_IMAGE}}"
  
  # docker.io/sd25/tracko-app
  # jdbc:postgresql://192.168.0.136:5432/tracko-db, tracko-admin, postgres
  docker:publish:
    desc: Tag and push the Docker image to a registry
    cmds:
      - cmd: docker build -t "{{.DOCKER_IMAGE}}" .
      - cmd: docker tag "{{.DOCKER_IMAGE}}" "{{.DOCKER_PUBLISH_IMAGE}}"
      - cmd: docker push "{{.DOCKER_PUBLISH_IMAGE}}"
