databaseChangeLog:
  - changeSet:
      id: 001-initial-schema
      author: sd25
      changes:
        - createTable:
            tableName: users
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: varchar(255) }
              - column: { name: phone_no, type: varchar(32) }
              - column: { name: email, type: varchar(255) }
              - column: { name: profile_pic, type: varchar(512) }
              - column: { name: fire_base_id, type: varchar(128) }
              - column: { name: is_shadow, type: int }
              - column: { name: global_id, type: varchar(64) }
              - column: { name: base_currency, type: varchar(3), defaultValue: "INR" }
              - column: { name: is_admin, type: int, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: created_at, type: timestamp, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: updated_at, type: timestamp, defaultValueComputed: CURRENT_TIMESTAMP }
        - addUniqueConstraint:
            tableName: users
            columnNames: phone_no
            constraintName: uq_users_phone_no
        - addUniqueConstraint:
            tableName: users
            columnNames: global_id
            constraintName: uq_users_global_id

  - changeSet:
      id: 004-contacts-create-table
      author: sd25
      changes:
        - createTable:
            tableName: contacts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_contacts
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(250)
                  constraints:
                    nullable: false
              - column:
                  name: phone_no
                  type: VARCHAR(32)
              - column:
                  name: email
                  type: VARCHAR(150)

  - changeSet:
      id: 004-contacts-fk-user
      author: sd25
      changes:
        - addForeignKeyConstraint:
            baseTableName: contacts
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_contacts_user
            onDelete: CASCADE

  - changeSet:
      id: 004-contacts-index-user
      author: sd25
      changes:
        - createIndex:
            indexName: idx_contacts_user
            tableName: contacts
            columns:
              - column:
                  name: user_id

  - changeSet:
      id: 003-add-missing-tables
      author: sd25
      changes:
        - createTable:
            tableName: accounts
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: varchar(250), constraints: { nullable: false } }
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: currency, type: varchar(3), defaultValue: "INR" }
        - addForeignKeyConstraint:
            baseTableName: accounts
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_accounts_user
            onDelete: CASCADE
        - createIndex:
            tableName: accounts
            indexName: idx_accounts_user
            columns: [ { column: { name: user_id } } ]

        - createTable:
            tableName: categories
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: varchar(250), constraints: { nullable: false } }
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: category_type, type: varchar(16), defaultValue: EXPENSE, constraints: { nullable: false } }
              - column: { name: parent_category_id, type: bigint }
        - addForeignKeyConstraint:
            baseTableName: categories
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_categories_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: categories
            baseColumnNames: parent_category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_categories_parent
            onDelete: SET NULL
        - createIndex:
            tableName: categories
            indexName: idx_categories_user
            columns: [ { column: { name: user_id } } ]

        - createTable:
            tableName: transactions
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: transaction_type, type: int, constraints: { nullable: false } }
              - column: { name: name, type: varchar(128), constraints: { nullable: false } }
              - column: { name: comments, type: varchar(512) }
              - column: { name: date, type: timestamp, constraints: { nullable: false } }
              - column: { name: amount, type: "numeric(12,2)", constraints: { nullable: false } }
              - column: { name: account_id, type: bigint, constraints: { nullable: false } }
              - column: { name: category_id, type: bigint, constraints: { nullable: false } }
              - column: { name: is_countable, type: int, defaultValue: "1" }
              - column: { name: original_currency, type: varchar(3) }
              - column: { name: original_amount, type: double }
              - column: { name: exchange_rate, type: double }
        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: account_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_transactions_account
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_transactions_category
            onDelete: CASCADE
        - createIndex:
            tableName: transactions
            indexName: idx_transactions_date
            columns: [ { column: { name: date } } ]
        - createIndex:
            tableName: transactions
            indexName: idx_transactions_account
            columns: [ { column: { name: account_id } } ]
        - createTable:
            tableName: splits
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: transaction_id, type: bigint, constraints: { nullable: false } }
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: amount, type: "numeric(12,2)", constraints: { nullable: false } }
              - column: { name: contact_id, type: BIGINT }
              - column: { name: settled_at, type: timestamp }
              - column: { name: is_settled, type: int, defaultValue: "0" }
        - addForeignKeyConstraint:
            baseTableName: splits
            baseColumnNames: transaction_id
            referencedTableName: transactions
            referencedColumnNames: id
            constraintName: fk_splits_transaction
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: splits
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_splits_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: splits
            baseColumnNames: contact_id
            referencedTableName: contacts
            referencedColumnNames: id
            constraintName: fk_splits_contact
            onDelete: SET NULL
        - createIndex:
            tableName: splits
            indexName: idx_splits_transaction
            columns: [ { column: { name: transaction_id } } ]
        - createIndex:
            tableName: splits
            indexName: idx_splits_user
            columns: [ { column: { name: user_id } } ]
        - createIndex:
            indexName: idx_splits_contact
            tableName: splits
            columns:
              - column:
                  name: contact_id

        - createTable:
            tableName: json_store
            columns:
              - column: { name: name, type: varchar(64), constraints: { primaryKey: true, nullable: false } }
              - column: { name: value, type: text }

  - changeSet:
      id: 006-add-zbb-tables
      author: sd25
      changes:
        - createTable:
            tableName: budget_months
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: budget_month, type: int, constraints: { nullable: false } }
              - column: { name: budget_year, type: int, constraints: { nullable: false } }
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: total_budget, type: double, defaultValueNumeric: 0.0 }
              - column: { name: is_closed, type: boolean, defaultValueBoolean: false }
              - column: { name: created_at, type: timestamp, defaultValueComputed: "CURRENT_TIMESTAMP" }
              - column: { name: updated_at, type: timestamp, defaultValueComputed: "CURRENT_TIMESTAMP" }
        - addForeignKeyConstraint:
            baseTableName: budget_months
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_budget_months_user
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: budget_months
            columnNames: user_id, budget_month, budget_year
            constraintName: uq_budget_months_user_date

        - createTable:
            tableName: budget_category_allocations
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: budget_month_id, type: bigint, constraints: { nullable: false } }
              - column: { name: category_id, type: bigint, constraints: { nullable: false } }
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: allocated_amount, type: double, defaultValueNumeric: 0.0 }
              - column: { name: actual_spent, type: double, defaultValueNumeric: 0.0 }
              - column: { name: remaining_balance, type: double, defaultValueNumeric: 0.0 }
        - addForeignKeyConstraint:
            baseTableName: budget_category_allocations
            baseColumnNames: budget_month_id
            referencedTableName: budget_months
            referencedColumnNames: id
            constraintName: fk_bca_budget_month
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: budget_category_allocations
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_bca_category
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: budget_category_allocations
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_bca_user
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: budget_category_allocations
            columnNames: budget_month_id, category_id
            constraintName: uq_bca_month_category

        - createTable:
            tableName: allocation_rules
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id, type: varchar(36), constraints: { nullable: false } }
              - column: { name: rule_name, type: varchar(255), constraints: { nullable: false } }
              - column: { name: allocation_percentage, type: double, constraints: { nullable: false } }
              - column: { name: is_active, type: boolean, defaultValueBoolean: true }
              - column: { name: created_at, type: timestamp, defaultValueComputed: "CURRENT_TIMESTAMP" }
              - column: { name: updated_at, type: timestamp, defaultValueComputed: "CURRENT_TIMESTAMP" }
        - addForeignKeyConstraint:
            baseTableName: allocation_rules
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_allocation_rules_user
            onDelete: CASCADE

  - changeSet:
      id: 011-add-account-month-summary
      author: sd25
      changes:
        - createTable:
            tableName: account_month_summary
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: account_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: summary_year
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: summary_month
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: income_total
                  type: DOUBLE
                  defaultValueNumeric: 0
              - column:
                  name: expense_total
                  type: DOUBLE
                  defaultValueNumeric: 0
              - column:
                  name: net_total
                  type: DOUBLE
                  defaultValueNumeric: 0
              - column:
                  name: count_countable
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - addUniqueConstraint:
            tableName: account_month_summary
            columnNames: user_id, account_id, summary_year, summary_month
            constraintName: uk_account_month_summary_user_account_year_month
        - createIndex:
            tableName: account_month_summary
            indexName: idx_account_month_summary_user_year_month
            columns:
              - column:
                  name: user_id
              - column:
                  name: summary_year
              - column:
                  name: summary_month
        - createIndex:
            tableName: account_month_summary
            indexName: idx_account_month_summary_user_account
            columns:
              - column:
                  name: user_id
              - column:
                  name: account_id
