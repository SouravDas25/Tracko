databaseChangeLog:
  - changeSet:
      id: 005-on-delete-restrict-fks
      author: cascade
      changes:
        # Replace CASCADE with RESTRICT for transactions.account_id -> accounts.id
        - dropForeignKeyConstraint:
            baseTableName: transactions
            constraintName: fk_transactions_account
        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: account_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_transactions_account
            onDelete: RESTRICT

        # Replace CASCADE with RESTRICT for transactions.category_id -> categories.id
        - dropForeignKeyConstraint:
            baseTableName: transactions
            constraintName: fk_transactions_category
        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_transactions_category
            onDelete: RESTRICT

        # Replace CASCADE with RESTRICT for budget_category_allocations.category_id -> categories.id
        - dropForeignKeyConstraint:
            baseTableName: budget_category_allocations
            constraintName: fk_bca_category
        - addForeignKeyConstraint:
            baseTableName: budget_category_allocations
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_bca_category
            onDelete: RESTRICT

        # Replace SET NULL with RESTRICT for splits.contact_id -> contacts.id
        - dropForeignKeyConstraint:
            baseTableName: splits
            constraintName: fk_splits_contact
        - addForeignKeyConstraint:
            baseTableName: splits
            baseColumnNames: contact_id
            referencedTableName: contacts
            referencedColumnNames: id
            constraintName: fk_splits_contact
            onDelete: RESTRICT
