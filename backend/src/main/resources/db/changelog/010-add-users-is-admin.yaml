databaseChangeLog:
  - changeSet:
      id: 010-users-add-is-admin
      author: cascade
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - tableExists:
              tableName: users
          - not:
              columnExists:
                tableName: users
                columnName: is_admin
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: is_admin
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
