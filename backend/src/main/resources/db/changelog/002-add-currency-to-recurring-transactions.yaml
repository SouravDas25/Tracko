databaseChangeLog:
  - changeSet:
      id: 002-add-currency-to-recurring-transactions
      author: sourav
      changes:
        - addColumn:
            tableName: recurring_transactions
            columns:
              - column:
                  name: original_currency
                  type: VARCHAR(3)
              - column:
                  name: original_amount
                  type: DOUBLE
              - column:
                  name: exchange_rate
                  type: DOUBLE
