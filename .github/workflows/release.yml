name: Build & Release Trako CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: trako-linux
            binary: dist/trako
          - os: macos-latest
            artifact: trako-macos
            binary: dist/trako
          - os: windows-latest
            artifact: trako-windows
            binary: dist/trako.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install ./sdk
          pip install ./cli

      - name: Build binary
        run: pyinstaller trako.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mv artifacts/trako-linux/trako trako-linux
          mv artifacts/trako-macos/trako trako-macos
          mv artifacts/trako-windows/trako.exe trako-windows.exe
          chmod +x trako-linux trako-macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            trako-linux
            trako-macos
            trako-windows.exe
