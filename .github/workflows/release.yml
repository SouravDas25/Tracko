name: Build & Release Trako CLI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn verify -Dspring.profiles.active=test
        working-directory: backend

  cli-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock psutil requests
          pip install ./sdk
          pip install ./cli

      - name: Run CLI tests with backend
        run: python cli/run_cli_test.py

  # ── Linux build ──────────────────────────────────────────────────────
  # Built inside a Debian 11 (Bullseye) container → GLIBC 2.31
  # Compatible with: Ubuntu 20.04+, Debian 11+, RHEL 9+, Fedora 34+, etc.
  build-linux:
    needs: [backend-test, cli-test]
    runs-on: ubuntu-22.04
    container:
      image: python:3.10-slim-bullseye

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends binutils
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install ./sdk
          pip install ./cli

      - name: Build binary
        run: python -m PyInstaller trako.spec

      - name: Verify GLIBC requirement
        run: |
          echo "--- Binary dependencies ---"
          ldd dist/trako || true
          objdump -T dist/trako 2>/dev/null | grep GLIBC | sed 's/.*GLIBC_//;s/ .*//' | sort -uV | tail -1 | xargs -I{} echo "Max GLIBC needed: {}" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trako-linux
          path: dist/trako

  # ── macOS builds ─────────────────────────────────────────────────────
  # Intel (x86_64): macos-15-intel for older Mac support
  # Apple Silicon (arm64): macos-15 for M1/M2/M3+ Macs
  build-macos:
    needs: [backend-test, cli-test]
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            artifact: trako-macos-x86_64
          - runner: macos-15
            artifact: trako-macos-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install ./sdk
          pip install ./cli

      - name: Build binary
        run: python -m PyInstaller trako.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/trako

  # ── Windows build ────────────────────────────────────────────────────
  # Python 3.10 supports Windows 8.1+
  # (Python 3.12+ dropped Windows 7/8 support)
  build-windows:
    needs: [backend-test, cli-test]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install ./sdk
          pip install ./cli

      - name: Build binary
        run: python -m PyInstaller trako.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trako-windows
          path: dist/trako.exe

  # ── Release ──────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version from commit
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y.%m.%d')
          echo "tag=v${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mv artifacts/trako-linux/trako trako-linux-x86_64
          mv artifacts/trako-macos-x86_64/trako trako-macos-x86_64
          mv artifacts/trako-macos-arm64/trako trako-macos-arm64
          mv artifacts/trako-windows/trako.exe trako-windows-x86_64.exe
          chmod +x trako-linux-x86_64 trako-macos-x86_64 trako-macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Trako CLI ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            trako-linux-x86_64
            trako-macos-x86_64
            trako-macos-arm64
            trako-windows-x86_64.exe
