name: Build & Release Trako CLI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run backend tests
        run: mvn verify -Dspring.profiles.active=test
        working-directory: backend

  cli-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock psutil requests
          pip install ./sdk
          pip install ./cli

      - name: Run CLI tests with backend
        run: python cli/run_cli_test.py

  build:
    needs: [backend-test, cli-test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: trako-linux
            binary: dist/trako
          - os: macos-latest
            artifact: trako-macos
            binary: dist/trako
          - os: windows-latest
            artifact: trako-windows
            binary: dist/trako.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install ./sdk
          pip install ./cli

      - name: Build binary
        run: pyinstaller trako.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version from commit
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y.%m.%d')
          echo "tag=v${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mv artifacts/trako-linux/trako trako-linux
          mv artifacts/trako-macos/trako trako-macos
          mv artifacts/trako-windows/trako.exe trako-windows.exe
          chmod +x trako-linux trako-macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Trako CLI ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            trako-linux
            trako-macos
            trako-windows.exe
